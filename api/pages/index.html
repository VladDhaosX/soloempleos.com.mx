<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solo Empleos — Guadalajara y Monterrey</title>
  <link rel="stylesheet" href="/shared/css/base.css">
  <link rel="stylesheet" href="/css/landing.css">
</head>
<body>

  <div class="landing-wrapper">
    <div class="landing-logo">
      <img src="/shared/img/logo-gdl.jpg" alt="Solo Empleos">
    </div>

    <div class="landing-cities">
      <a href="/gdl/inicio/" class="city-card" id="card-gdl">
        <h2 class="city-title">GUADALAJARA</h2>
        <div class="city-cover">
          <img id="portada-gdl" src="/shared/img/placeholder.svg" alt="Portada Guadalajara">
          <div class="city-placeholder" id="placeholder-gdl" style="display:none">Sin portada disponible</div>
        </div>
      </a>

      <a href="/mty/inicio/" class="city-card" id="card-mty">
        <h2 class="city-title">MONTERREY</h2>
        <div class="city-cover">
          <img id="portada-mty" src="/shared/img/placeholder.svg" alt="Portada Monterrey">
          <div class="city-placeholder" id="placeholder-mty" style="display:none">Sin portada disponible</div>
        </div>
      </a>
    </div>
  </div>

  <script src="/js/landing.js"></script>
</body>
</html>
