<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contacta a Solo Empleos Monterrey para publicidad, vacantes y atención a empresas o candidatos.">
  <link rel="canonical" href="https://soloempleos.com.mx/mty/contacto/">
  <meta property="og:locale" content="es_MX">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Solo Empleos">
  <meta property="og:title" content="Contacto Monterrey | Solo Empleos">
  <meta property="og:description" content="Contacta a Solo Empleos Monterrey para publicidad, vacantes y atenci&oacute;n a empresas o candidatos.">
  <meta property="og:url" content="https://soloempleos.com.mx/mty/contacto/">
  <meta property="og:image" content="https://soloempleos.com.mx/shared/img/og-mty.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Solo Empleos Monterrey, contacto">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contacto Monterrey | Solo Empleos">
  <meta name="twitter:description" content="Contacta a Solo Empleos Monterrey para publicidad, vacantes y atenci&oacute;n a empresas o candidatos.">
  <meta name="twitter:image" content="https://soloempleos.com.mx/shared/img/og-mty.jpg">
  <meta name="twitter:image:alt" content="Solo Empleos Monterrey, contacto">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <title>Contacto Monterrey | Solo Empleos</title>
  <link rel="stylesheet" href="/shared/css/base.css">
  <link rel="stylesheet" href="/shared/css/header.css">
  <link rel="stylesheet" href="/shared/css/footer.css">
  <link rel="stylesheet" href="/shared/css/contacto.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "@id": "https://soloempleos.com.mx/mty/contacto/#contact",
    "name": "Contacto Solo Empleos Monterrey",
    "url": "https://soloempleos.com.mx/mty/contacto/",
    "description": "Pagina de contacto de Solo Empleos Monterrey para publicidad, vacantes y atencion a empresas o candidatos.",
    "about": {
      "@id": "https://soloempleos.com.mx/mty/inicio/#business"
    }
  }
  </script>
</head>
<body data-region="mty">

  <div id="header-placeholder"></div>

  <main>
    <section class="contacto-section">
      <div class="contacto-container">
        <form id="contacto-form" novalidate>
          <div class="contacto-eyebrow">PUBLICIDAD<span class="eyebrow-dot"></span></div>
          <h1 class="contacto-title">Contáctanos en Monterrey</h1>

          <div class="form-group">
            <label for="nombre">Tu nombre</label>
            <input type="text" id="nombre" name="nombre" required autocomplete="name">
            <span class="field-error" id="error-nombre"></span>
          </div>

          <div class="form-group">
            <label for="email">Tu correo electrónico</label>
            <input type="email" id="email" name="email" required autocomplete="email">
            <span class="field-error" id="error-email"></span>
          </div>

          <div class="form-group">
            <label for="telefono">Tu número de teléfono</label>
            <input type="tel" id="telefono" name="telefono" required autocomplete="tel" inputmode="tel">
            <span class="field-error" id="error-telefono"></span>
          </div>

          <div class="form-group">
            <label for="asunto">Asunto</label>
            <input type="text" id="asunto" name="asunto" required>
            <span class="field-error" id="error-asunto"></span>
          </div>

          <div class="form-group">
            <label for="mensaje">Tu mensaje (opcional)</label>
            <textarea id="mensaje" name="mensaje" rows="8"></textarea>
          </div>

          <button type="submit" id="btn-enviar">ENVIAR</button>

          <div id="form-feedback" aria-live="polite"></div>
        </form>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="/shared/js/components.js"></script>
  <script src="/shared/js/contacto.js"></script>
</body>
</html>
