<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Encuentra vacantes y oportunidades de empleo en Guadalajara y Monterrey con Solo Empleos.">
  <link rel="canonical" href="https://soloempleos.com.mx/">
  <meta property="og:locale" content="es_MX">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Solo Empleos">
  <meta property="og:title" content="Empleos en Guadalajara y Monterrey | Solo Empleos">
  <meta property="og:description" content="Encuentra vacantes y oportunidades de empleo en Guadalajara y Monterrey con Solo Empleos.">
  <meta property="og:url" content="https://soloempleos.com.mx/">
  <meta property="og:image" content="https://soloempleos.com.mx/shared/img/og-home.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Solo Empleos, vacantes en Guadalajara y Monterrey">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Empleos en Guadalajara y Monterrey | Solo Empleos">
  <meta name="twitter:description" content="Encuentra vacantes y oportunidades de empleo en Guadalajara y Monterrey con Solo Empleos.">
  <meta name="twitter:image" content="https://soloempleos.com.mx/shared/img/og-home.jpg">
  <meta name="twitter:image:alt" content="Solo Empleos, vacantes en Guadalajara y Monterrey">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <title>Empleos en Guadalajara y Monterrey | Solo Empleos</title>
  <link rel="stylesheet" href="/shared/css/base.css">
  <link rel="stylesheet" href="/css/landing.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "@id": "https://soloempleos.com.mx/#organization",
    "name": "Solo Empleos",
    "url": "https://soloempleos.com.mx/",
    "logo": "https://soloempleos.com.mx/shared/img/logo-gdl.jpg",
    "description": "Vacantes y oportunidades de empleo en Guadalajara y Monterrey.",
    "areaServed": [
      {
        "@type": "City",
        "name": "Guadalajara"
      },
      {
        "@type": "City",
        "name": "Monterrey"
      }
    ]
  }
  </script>
</head>
<body>

  <main class="landing-wrapper">
    <h1 class="sr-only">Empleos en Guadalajara y Monterrey</h1>
    <div class="landing-logo">
      <img src="/shared/img/logo-gdl.jpg" alt="Solo Empleos">
    </div>

    <div class="landing-cities">
      <a href="/gdl/inicio/" class="city-card" id="card-gdl">
        <h2 class="city-title">GUADALAJARA</h2>
        <div class="city-cover">
          <img id="portada-gdl" src="__SSR_PORTADA_GDL__" alt="Portada Guadalajara"
               onerror="this.onerror=null;this.src='/shared/img/placeholder.svg'">
        </div>
      </a>

      <a href="/mty/inicio/" class="city-card" id="card-mty">
        <h2 class="city-title">MONTERREY</h2>
        <div class="city-cover">
          <img id="portada-mty" src="__SSR_PORTADA_MTY__" alt="Portada Monterrey"
               onerror="this.onerror=null;this.src='/shared/img/placeholder.svg'">
        </div>
      </a>
    </div>
  </main>

</body>
</html>
