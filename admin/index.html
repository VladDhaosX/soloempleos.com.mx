<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Solo Empleos - Admin</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <div class="login-logo">SOLO EMPLEOS</div>
      <div class="login-subtitle">Panel Admin</div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-usuario">Usuario</label>
          <input type="text" id="login-usuario" name="usuario" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="login-password">Contrasena</label>
          <input type="password" id="login-password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" id="btn-login">ENTRAR</button>
        <div id="login-error" class="login-error" aria-live="polite"></div>
      </form>
    </div>
  </div>

  <!-- Admin panel -->
  <div id="admin-panel" class="admin-panel" style="display:none">
    <header class="admin-header">
      <div class="admin-header-logo">SOLO EMPLEOS - Admin</div>
      <div class="admin-region-selector">
        <button class="region-btn active" data-region="gdl">GDL</button>
        <button class="region-btn" data-region="mty">MTY</button>
      </div>
      <button id="btn-backup" class="btn-backup" type="button">Descargar backup</button>
      <label class="btn-restore" for="input-backup">Restaurar backup</label>
      <input type="file" id="input-backup" accept=".zip,application/zip" style="display:none">
      <button id="btn-logout" class="btn-logout">Cerrar sesion</button>
      <div id="backup-status" class="backup-status" aria-live="polite"></div>
    </header>

    <main class="admin-main">

      <!-- Portada del dia -->
      <section class="admin-card" id="section-portada">
        <h2>Portada del dia</h2>
        <div class="portada-preview-wrap">
          <img id="portada-preview" src="" alt="Portada actual" class="portada-img">
          <div id="portada-placeholder" class="portada-placeholder">Sin portada</div>
        </div>
        <label class="upload-btn" for="input-portada">
          Subir nueva portada
          <input type="file" id="input-portada" accept="image/*" style="display:none">
        </label>
        <div id="portada-status" class="upload-status"></div>
      </section>

      <!-- Vacantes -->
      <section class="admin-card" id="section-vacantes">
        <h2>Vacantes</h2>
        <label class="upload-btn" for="input-vacantes">
          + Subir vacante(s)
          <input type="file" id="input-vacantes" accept="image/*" multiple style="display:none">
        </label>
        <label class="upload-btn upload-btn-replace" for="input-vacantes-carpeta">
          Reemplazar todo (carpeta)
          <input type="file" id="input-vacantes-carpeta" accept="image/*" webkitdirectory style="display:none">
        </label>
        <div id="vacantes-status" class="upload-status"></div>
        <div id="vacantes-grid" class="admin-vacantes-grid"></div>
      </section>

    </main>
  </div>

  <script src="/admin/js/admin.js"></script>
</body>
</html>
